version: '3.8'

services:
  # WSDOT Ferry MCP Server
  wsdot-server:
    build: .
    container_name: kitsap-wsdot-server
    env_file:
      - .env
    stdin_open: true
    tty: true
    command: ["python", "wsdot_server.py"]

  # Events Write MCP Server
  events-write-server:
    build: .
    container_name: kitsap-events-write-server
    env_file:
      - .env
    stdin_open: true
    tty: true
    command: ["python", "events_write_server.py"]

  # Events Read MCP Server
  events-read-server:
    build: .
    container_name: kitsap-events-read-server
    env_file:
      - .env
    stdin_open: true
    tty: true
    command: ["python", "events_read_server.py"]
